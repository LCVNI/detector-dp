<!--
  Categoria: Combinada (realista) — os 3 dark patterns coexistem,
  simulando um checkout real onde padrões raramente aparecem isolados.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LojaModelo — Checkout</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f7;margin:0;color:#222}
  .topo{background:#1c2b3a;color:#fff;padding:16px 24px;font-weight:bold;font-size:20px}
  .container{max-width:640px;margin:32px auto;background:#fff;border-radius:8px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  h1{font-size:18px;margin-top:0}
  #elemento-timer{background:#c62828;color:#fff;padding:10px 14px;border-radius:6px;text-align:center;font-weight:bold;margin-bottom:18px}
  .item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
  .linha-total{display:flex;justify-content:space-between;font-weight:bold;padding:14px 0;font-size:16px}
  .linha-nova{background:#fffceb;animation:destaque 1.2s ease-out}
  @keyframes destaque{from{background:#fff3b0}to{background:#fffceb}}
  .opcao{display:flex;align-items:center;gap:8px;margin:14px 0;font-size:14px}
  button{background:#2e7d32;color:#fff;border:0;padding:12px 20px;border-radius:6px;font-size:15px;cursor:pointer;width:100%;margin-top:10px}
  .rodape-conta{margin-top:36px;font-size:10px;color:#cfcfcf;text-align:center}
  #elemento-cancelar{color:#d8d8d8;text-decoration:underline;cursor:pointer}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
  .modal.aberto{display:flex}
  .caixa-modal{background:#fff;padding:24px;border-radius:8px;max-width:360px;text-align:center}
  .caixa-modal button{margin:6px;padding:10px 16px;border-radius:6px;border:0;cursor:pointer;width:auto}
  .btn-continuar{background:#2e7d32;color:#fff}
  .btn-cancelar-real{background:#eee;color:#333;font-size:11px}
</style>
</head>
<body data-dp-origem="real" data-dp-categoria-intencao="combinada">
  <div class="topo">LojaModelo</div>
  <div class="container">
    <!-- Ação Forçada -->
    <div id="elemento-timer">Restam <span id="contador">02:00</span> para garantir este preço!</div>

    <h1>Resumo do pedido</h1>
    <div id="resumo-carrinho">
      <div class="item"><span>Cafeteira elétrica</span><span>R$ 349,90</span></div>
      <div class="linha-total" id="linha-subtotal"><span>Subtotal</span><span id="valor-subtotal">R$ 349,90</span></div>
    </div>

    <!-- Ação Forçada -->
    <div class="opcao">
      <input type="checkbox" id="elemento-checkbox-preselecionado" checked>
      <label for="elemento-checkbox-preselecionado">Quero receber ofertas por e-mail e de parceiros selecionados</label>
    </div>

    <button id="btn-finalizar">Comprar agora</button>

    <!-- Obstrução -->
    <div class="rodape-conta">
      <span id="elemento-cancelar">cancelar assinatura</span>
    </div>
  </div>

  <div class="modal" id="modal1">
    <div class="caixa-modal">
      <p>Tem certeza? Você perderá acesso a conteúdos exclusivos.</p>
      <button class="btn-continuar" id="btn-manter1">Manter assinatura</button><br>
      <button class="btn-cancelar-real" id="btn-avancar2">Ainda quero cancelar</button>
    </div>
  </div>
  <div class="modal" id="modal2">
    <div class="caixa-modal">
      <p>Última confirmação: o cancelamento é imediato.</p>
      <button class="btn-continuar" id="btn-manter2">Voltar</button><br>
      <button class="btn-cancelar-real" id="btn-confirmar">Confirmar cancelamento</button>
    </div>
  </div>

<script>
  // Furtividade: taxa oculta inserida via mutação real do DOM
  const TEMPO_MUTACAO_MS = 3000;
  setTimeout(() => {
    const resumo = document.getElementById('resumo-carrinho');
    const subtotalLinha = document.getElementById('linha-subtotal');
    const novaLinha = document.createElement('div');
    novaLinha.className = 'item linha-nova';
    novaLinha.id = 'elemento-taxa-oculta';
    novaLinha.innerHTML = '<span>Custo adicional de manuseio</span><span>R$ 19,90</span>';
    resumo.insertBefore(novaLinha, subtotalLinha);
    const novoTotal = 349.90 + 19.90;
    document.getElementById('valor-subtotal').textContent =
      'R$ ' + novoTotal.toFixed(2).replace('.', ',');
  }, TEMPO_MUTACAO_MS);

  // Ação Forçada: contador falso, reinicia a cada carregamento
  let restante = 120;
  const el = document.getElementById('contador');
  setInterval(() => {
    if (restante <= 0) return;
    restante--;
    const m = String(Math.floor(restante / 60)).padStart(2, '0');
    const s = String(restante % 60).padStart(2, '0');
    el.textContent = `${m}:${s}`;
  }, 1000);

  // Obstrução: fluxo de 2 modais para cancelar
  const abrir = id => document.getElementById(id).classList.add('aberto');
  const fechar = id => document.getElementById(id).classList.remove('aberto');
  document.getElementById('elemento-cancelar').addEventListener('click', () => abrir('modal1'));
  document.getElementById('btn-manter1').addEventListener('click', () => fechar('modal1'));
  document.getElementById('btn-avancar2').addEventListener('click', () => { fechar('modal1'); abrir('modal2'); });
  document.getElementById('btn-manter2').addEventListener('click', () => fechar('modal2'));
  document.getElementById('btn-confirmar').addEventListener('click', () => {
    fechar('modal2');
    alert('Assinatura cancelada (simulação — página de teste).');
  });

  document.getElementById('btn-finalizar').addEventListener('click', () => {
    alert('Pedido enviado (simulação — página de teste).');
  });
</script>
</body>
</html>
